<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Compiler Error Explainer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@10..48,400;10..48,600;10..48,800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="page-glow"></div>
  <main class="app-shell">
    <section class="hero">
      <h1>Compiler Error Explainer</h1>
    </section>

    <section class="workspace">
      <div class="panel input-panel">
        <div class="panel-head">
          <h2>Input</h2>
          <div class="head-actions">
            <button id="load-example" class="ghost-btn" type="button">Load Example 1</button>
            <button id="load-example-2" class="ghost-btn" type="button">Load Example 2</button>
          </div>
        </div>

        <textarea id="code-input" spellcheck="false" aria-label="C source code input"></textarea>

        <div class="actions">
          <button id="analyze-btn" class="primary-btn" type="button">Run Analysis</button>
        </div>
      </div>

      <div class="panel output-panel">
        <div class="panel-head">
          <h2>Output</h2>
          <span id="runtime" class="runtime"></span>
        </div>
        <div id="carbon-summary" class="carbon-summary"></div>
        <div id="status" class="status">Ready.</div>
        <div id="results" class="results"></div>
      </div>
    </section>
  </main>

  <script>
    window.DEFAULT_CODE = {{ default_code|tojson }};
  </script>
  <script src="/static/app.js"></script>
</body>
</html>
